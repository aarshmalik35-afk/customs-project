<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customs Digital Twin</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="header">

<h1>CUSTOMS DIGITAL TWIN</h1>

</div>

<div id="container"></div>

<div id="telemetry">

    <h2>Telemetry</h2>

    <p><strong>Shipment ID:</strong> <span id="shipmentId">SHP-001</span></p>

    <p><strong>Container Status:</strong> <span id="containerStatus">In Transit</span></p>

    <hr>

    <p><strong>Temperature:</strong> <span id="temp">28</span> °C</p>

    <p><strong>Humidity:</strong> <span id="humidity">65</span> %</p>

    <hr>

    <p><strong>Shock Events:</strong> <span id="shock">0</span></p>

    <p><strong>Vibration:</strong> <span id="vibration">Low</span></p>

    <p><strong>Door Status:</strong> <span id="door">Closed</span></p>

    <p><strong>Seal Status:</strong> <span id="seal">Intact</span></p>

    <p><strong>Container Tilt:</strong> <span id="tilt">0</span>°</p>

    <p><strong>Location:</strong> <span id="location">Singapore Port</span></p>

    <hr>

    <p><strong>Risk Score:</strong> <span id="risk">0</span></p>

    <p><strong>Status:</strong> <span id="status">Approved</span></p>

</div>

</body>

</html>
