<!DOCTYPE html>
<html>
<head>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{
background:#0b1f3a;
margin:0;
}

h1{
color:white;
text-align:center;
}

model-viewer{
width:100%;
height:90vh;
}
</style>

</head>

<body>

<h1>CUSTOMS DIGITAL TWIN</h1>

<model-viewer
src="ship.glb"
camera-controls
auto-rotate
shadow-intensity="1">
</model-viewer>

<div id="telemetry">
   
<h2>Telemetry</h2>
<p>Temperature: <span id="temp">--</span> °C</p>
p>Humidity: <span id="humidity">--</span> %</p>
<p>Risk Score: <span id="risk">--</span></p>
<p>Status: <span id="status">--</span></p>

</div>

</body>
</html>
